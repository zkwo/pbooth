<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iPhone Photobooth</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
}

/* TOOLBAR */
.toolbar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 10px;
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(20px);
}

/* BUTTON */
.btn {
  background: rgba(255,255,255,0.1);
  padding: 10px 15px;
  border-radius: 12px;
}

/* COUNT */
.countdown {
  position: absolute;
  font-size: 80px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

/* PAPER FRAME */
.frame-paper {
  background: url('https://i.imgur.com/8Km9tLL.png');
  background-size: cover;
  padding: 25px;
}

.frame-polaroid {
  background: white;
  padding: 15px 15px 60px 15px;
}

.frame-black {
  background: black;
  padding: 20px;
}

.preview img {
  border-radius: 10px;
  margin-bottom: 10px;
}

/* HISTORY */
.history {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}
.history img {
  width: 80px;
  border-radius: 10px;
}
</style>
</head>

<body class="text-white">

<div class="p-4 max-w-md mx-auto">

  <!-- CAMERA -->
  <div class="relative">
    <video id="video" autoplay playsinline class="w-full h-[300px] object-cover rounded-xl"></video>
    <div id="count" class="countdown hidden"></div>
  </div>

  <!-- MODE -->
  <div class="flex gap-2 mt-3">
    <button onclick="setMode(1)" class="btn">1x</button>
    <button onclick="setMode(3)" class="btn">3x</button>
    <button onclick="setMode(4)" class="btn">4x</button>
  </div>

  <!-- FRAME SELECT -->
  <div class="flex gap-2 mt-3 overflow-x-auto">
    <button onclick="setFrame('paper')" class="btn">Paper</button>
    <button onclick="setFrame('polaroid')" class="btn">Polaroid</button>
    <button onclick="setFrame('black')" class="btn">Black</button>
  </div>

  <!-- PREVIEW -->
  <div id="preview" class="mt-4 preview"></div>

  <!-- HISTORY -->
  <div class="mt-4">
    <p class="text-sm opacity-60 mb-1">History</p>
    <div id="history" class="history"></div>
  </div>

</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <button onclick="startCapture()" class="btn">📸</button>
  <button onclick="saveImage()" class="btn">💾</button>
  <button onclick="resetAll()" class="btn">🗑️</button>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const countEl = document.getElementById("count");
const preview = document.getElementById("preview");
const historyBox = document.getElementById("history");

let mode = 1;
let frame = "paper";
let photos = [];

/* CAMERA */
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => video.srcObject = stream);

/* MODE */
function setMode(m) { mode = m; }

/* FRAME */
function setFrame(f) {
  frame = f;
  renderPreview();
}

/* COUNTDOWN */
function countdown() {
  return new Promise(resolve => {
    let c = 3;
    countEl.classList.remove("hidden");
    countEl.innerText = c;

    const i = setInterval(() => {
      c--;
      if (c === 0) {
        clearInterval(i);
        countEl.classList.add("hidden");
        resolve();
      } else {
        countEl.innerText = c;
      }
    }, 800);
  });
}

/* CAPTURE */
function capture() {
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  return canvas.toDataURL();
}

/* START */
async function startCapture() {
  photos = [];

  for (let i = 0; i < mode; i++) {
    await countdown();
    photos.push(capture());
  }

  renderPreview();
}

/* PREVIEW */
function renderPreview() {
  preview.innerHTML = "";

  const frameDiv = document.createElement("div");

  if (frame === "paper") frameDiv.className = "frame-paper";
  if (frame === "polaroid") frameDiv.className = "frame-polaroid";
  if (frame === "black") frameDiv.className = "frame-black";

  photos.forEach(p => {
    const img = document.createElement("img");
    img.src = p;
    frameDiv.appendChild(img);
  });

  preview.appendChild(frameDiv);
}

/* SAVE */
function saveImage() {
  if (!preview.firstChild) return;

  html2canvas(preview.firstChild).then(canvasData => {
    const data = canvasData.toDataURL();

    let history = JSON.parse(localStorage.getItem("photoHistory") || "[]");
    history.unshift(data);
    localStorage.setItem("photoHistory", JSON.stringify(history));

    loadHistory();
  });
}

/* LOAD HISTORY */
function loadHistory() {
  historyBox.innerHTML = "";

  let history = JSON.parse(localStorage.getItem("photoHistory") || "[]");

  history.forEach(img => {
    const el = document.createElement("img");
    el.src = img;
    el.onclick = () => {
      preview.innerHTML = `<img src="${img}" class="rounded-xl">`;
    };
    historyBox.appendChild(el);
  });
}

/* RESET */
function resetAll() {
  photos = [];
  preview.innerHTML = "";
}

loadHistory();
</script>

</body>
  </html>
