<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth Pro UI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg, #0a0a0a, #000);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}

/* BUTTON */
.btn:active { transform: scale(0.95); }

/* COUNT */
.countdown {
  position: absolute;
  font-size: 80px;
  font-weight: bold;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

/* PREVIEW */
.preview-box {
  border-radius: 20px;
  overflow: hidden;
}

/* FRAME STYLE */
.frame-polaroid {
  background: white;
  padding: 15px 15px 50px 15px;
}
.frame-black {
  background: black;
  padding: 20px;
}
.frame-minimal {
  background: #111;
  padding: 10px;
}

.flash {
  animation: flash 0.2s;
}
@keyframes flash {
  from { background: white; }
  to { background: transparent; }
}
</style>
</head>

<body class="text-white flex flex-col items-center justify-center min-h-screen p-4">

<!-- CAMERA -->
<div class="w-full max-w-md glass p-4 rounded-3xl">

  <h1 class="text-center mb-2">📸 Photobooth</h1>

  <div class="relative">
    <video id="video" autoplay playsinline class="w-full h-[300px] object-cover rounded-xl"></video>
    <div id="count" class="countdown hidden"></div>
  </div>

  <!-- MODE -->
  <div class="flex gap-2 mt-3 overflow-x-auto">
    <button onclick="setMode(1)" class="glass px-3 py-1 rounded-xl">Manual</button>
    <button onclick="setMode(3)" class="glass px-3 py-1 rounded-xl">3 Foto</button>
    <button onclick="setMode(4)" class="glass px-3 py-1 rounded-xl">4 Foto</button>
  </div>

  <button onclick="startCapture()" class="mt-4 w-full py-3 glass rounded-xl">
    Ambil Foto
  </button>

</div>

<!-- PREVIEW -->
<div class="w-full max-w-md mt-5 text-center">

  <div id="previewContainer" class="preview-box"></div>

  <!-- FRAME SELECT -->
  <div class="flex gap-2 mt-3 justify-center">
    <button onclick="applyFrame('polaroid')" class="glass px-3 py-1 rounded-xl">Polaroid</button>
    <button onclick="applyFrame('black')" class="glass px-3 py-1 rounded-xl">Black</button>
    <button onclick="applyFrame('minimal')" class="glass px-3 py-1 rounded-xl">Minimal</button>
  </div>

  <a id="download" class="block mt-3 opacity-70">Belum ada hasil</a>

</div>

<canvas id="canvas" class="hidden"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const countEl = document.getElementById("count");
const previewContainer = document.getElementById("previewContainer");
const download = document.getElementById("download");

let mode = 1;
let photos = [];
let currentFrame = "polaroid";

/* CAMERA */
navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
.then(stream => video.srcObject = stream);

/* MODE */
function setMode(m) {
  mode = m;
}

/* COUNTDOWN */
function countdown() {
  return new Promise(resolve => {
    let c = 3;
    countEl.classList.remove("hidden");
    countEl.innerText = c;

    const i = setInterval(() => {
      c--;
      if (c === 0) {
        clearInterval(i);
        countEl.classList.add("hidden");
        resolve();
      } else {
        countEl.innerText = c;
      }
    }, 800);
  });
}

/* CAPTURE */
function capture() {
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  document.body.classList.add("flash");
  setTimeout(() => document.body.classList.remove("flash"), 150);

  return canvas.toDataURL();
}

/* START */
async function startCapture() {
  photos = [];

  for (let i = 0; i < mode; i++) {
    await countdown();
    photos.push(capture());
  }

  renderPreview();
}

/* PREVIEW */
function renderPreview() {
  previewContainer.innerHTML = "";

  const frame = document.createElement("div");
  frame.className = "p-2";

  if (currentFrame === "polaroid") frame.classList.add("frame-polaroid");
  if (currentFrame === "black") frame.classList.add("frame-black");
  if (currentFrame === "minimal") frame.classList.add("frame-minimal");

  photos.forEach(p => {
    const img = document.createElement("img");
    img.src = p;
    img.className = "w-full mb-2 rounded-lg";
    frame.appendChild(img);
  });

  previewContainer.appendChild(frame);

  generateDownload(frame);
}

/* FRAME SWITCH */
function applyFrame(type) {
  currentFrame = type;
  renderPreview();
}

/* DOWNLOAD */
function generateDownload(frame) {
  const rect = frame.getBoundingClientRect();

  const tempCanvas = document.createElement("canvas");
  tempCanvas.width = rect.width * 2;
  tempCanvas.height = rect.height * 2;

  const ctx = tempCanvas.getContext("2d");
  ctx.scale(2,2);

  html2canvas(frame).then(canvasData => {
    ctx.drawImage(canvasData, 0, 0);

    const data = tempCanvas.toDataURL("image/png");
    download.href = data;
    download.download = "photobooth.png";
    download.innerText = "⬇️ Download";
  });
}
</script>

<!-- html2canvas -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
