<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serenity Booth</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg,#f3f4f6,#e5e7eb);
}

/* HIDE PAGE */
.page { display:none; }
.active { display:block; }

/* CARD */
.card {
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* BUTTON */
.btn-main {
  background: linear-gradient(90deg,#a855f7,#ec4899);
  color:white;
  padding:14px;
  border-radius:20px;
  width:100%;
}

/* LAYOUT BOX */
.layout-box {
  border-radius:15px;
  padding:10px;
  background:#f9fafb;
}

/* PHOTO FRAME */
.frame {
  border-radius:20px;
  padding:15px;
  background:white;
}

/* STICKER */
.sticker {
  width:40px;
  cursor:pointer;
}

/* CANVAS BOX */
#photoArea img {
  border-radius:10px;
}
</style>
</head>

<body class="p-4">

<!-- ================= LANDING ================= -->
<div id="home" class="page active max-w-md mx-auto text-center">

<h1 class="text-2xl font-bold mb-3 text-purple-600">Serenity Booth</h1>

<h2 class="text-3xl font-bold mb-2">Capture Memories</h2>
<p class="mb-4 text-gray-500">Create stunning photo strips instantly</p>

<button onclick="goPage('layout')" class="btn-main">
📸 Start Photo Session
</button>

</div>


<!-- ================= LAYOUT ================= -->
<div id="layout" class="page max-w-md mx-auto">

<h2 class="text-xl font-bold mb-4">Select Layout</h2>

<div class="space-y-3">

<div class="card flex justify-between">
  <p>Classic Four</p>
  <button onclick="selectLayout(4)">Select</button>
</div>

<div class="card flex justify-between">
  <p>Vertical Duo</p>
  <button onclick="selectLayout(2)">Select</button>
</div>

<div class="card flex justify-between">
  <p>Dynamic Six</p>
  <button onclick="selectLayout(6)">Select</button>
</div>

</div>

</div>


<!-- ================= SESSION ================= -->
<div id="session" class="page max-w-md mx-auto">

<h2 class="text-xl font-bold mb-3">Capture your set</h2>

<!-- CAMERA -->
<video id="video" autoplay playsinline class="w-full rounded-xl mb-3"></video>

<button onclick="takePhoto()" class="btn-main mb-3">📸 Take Photo</button>

<!-- RESULT -->
<div id="photoArea" class="frame mb-3"></div>

<!-- ACTION -->
<div class="flex gap-2">
<button onclick="downloadImage()" class="btn-main">Download</button>
<button onclick="resetPhotos()" class="bg-gray-200 p-3 rounded-xl w-full">Retake</button>
</div>

<!-- COLOR -->
<h3 class="mt-5 mb-2 font-semibold">Choose color</h3>
<div class="flex gap-2 flex-wrap">
<div onclick="setColor('#fff')" class="w-8 h-8 rounded-full bg-white border"></div>
<div onclick="setColor('#fcd34d')" class="w-8 h-8 rounded-full bg-yellow-400"></div>
<div onclick="setColor('#fb7185')" class="w-8 h-8 rounded-full bg-pink-400"></div>
<div onclick="setColor('#60a5fa')" class="w-8 h-8 rounded-full bg-blue-400"></div>
</div>

<!-- STICKER -->
<h3 class="mt-5 mb-2 font-semibold">Add sticker</h3>
<div class="flex gap-2 flex-wrap">
<img src="https://cdn-icons-png.flaticon.com/512/742/742751.png" class="sticker" onclick="addSticker(this.src)">
<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" class="sticker" onclick="addSticker(this.src)">
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="sticker" onclick="addSticker(this.src)">
</div>

</div>


<script>
let currentPage = "home";
let layoutCount = 4;
let photos = [];
let color = "#fff";

const video = document.getElementById("video");

/* CAMERA */
navigator.mediaDevices.getUserMedia({video:true})
.then(s => video.srcObject = s);

/* PAGE */
function goPage(p){
  document.getElementById(currentPage).classList.remove("active");
  document.getElementById(p).classList.add("active");
  currentPage = p;
}

/* SELECT LAYOUT */
function selectLayout(n){
  layoutCount = n;
  goPage("session");
}

/* TAKE PHOTO */
function takePhoto(){
  if(photos.length >= layoutCount) return;

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  photos.push(canvas.toDataURL());

  renderPhotos();
}

/* RENDER */
function renderPhotos(){
  const area = document.getElementById("photoArea");
  area.innerHTML = "";
  area.style.background = color;

  photos.forEach(p=>{
    const img = document.createElement("img");
    img.src = p;
    img.className = "mb-2";
    area.appendChild(img);
  });
}

/* COLOR */
function setColor(c){
  color = c;
  renderPhotos();
}

/* STICKER */
function addSticker(src){
  const img = document.createElement("img");
  img.src = src;
  img.style.position = "absolute";
  img.style.width = "50px";
  img.style.top = "10px";
  img.style.left = "10px";

  document.getElementById("photoArea").appendChild(img);
}

/* RESET */
function resetPhotos(){
  photos = [];
  renderPhotos();
}

/* DOWNLOAD */
function downloadImage(){
  html2canvas(document.getElementById("photoArea"))
  .then(c=>{
    const a = document.createElement("a");
    a.href = c.toDataURL();
    a.download = "photobooth.png";
    a.click();
  });
}
</script>

</body>
    </html>
